repos:
  - name: devteam
    path: .
    role: primary
    changes: |
      Add PATCH /api/features/{id} endpoint for editing feature title and priority (handler + DTO + route in internal/api/server.go).
      Add DELETE /api/features/{id} endpoint for hard-deleting a feature and cascade-related data (handler + route in internal/api/server.go).
      Add processing-state guards (IsProcessing / IsSessionAlive) and status guards (in_progress/waiting_for_feedback/gate_blocked) to both endpoints.
      Add UpdateFeatureMetadata (or equivalent targeted) DB method in internal/db/feature_store.go to avoid clobbering current_phase/status when PATCHing title/priority.
      Add editFeature and deleteFeature functions to ui/src/api/client.ts and types to ui/src/types/index.ts.
      Add edit form + delete button with confirm dialog to ui/src/pages/FeatureDetail.tsx, with disabled states and tooltips for non-editable/non-deletable statuses.
      Add delete affordance to ui/src/components/FeatureCard.tsx (dashboard, US-003).
      Add integration tests (httptest) in internal/api/ for PATCH and DELETE covering 200/204/400/404/409 paths and cascade.
      Add Playwright e2e tests in ui/ for edit-form, delete-confirm, disabled-state, and dashboard-delete flows.