feature_id: kanban-view
# Repositories affected by the kanban-view feature.
# This feature is a UI-only change to the Dev Team web app. It adds a Kanban
# board view over the existing GET /api/features response. No backend changes,
# no new endpoints, no DTO changes — therefore only the devteam repo is in scope.
repos:
  - name: devteam
    path: ~/source/devteam
    role: primary
    changes: >
      UI-only. Adds KanbanBoard, KanbanColumn, KanbanCard, ViewToggle components
      and useSessionView hook under ui/src/. Adds groupFeaturesByPhase pure
      function + unit test. Modifies Dashboard.tsx to render toggle + board.
      Adds Playwright e2e tests under ui/e2e/kanban.spec.ts. Reuses existing
      GET /api/features endpoint, FeatureCard visual contract, and react-query
      ['features'] cache. No changes to internal/api/, internal/feature/, the
      Go binary, or ui/package.json dependencies.