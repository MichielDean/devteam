repos:
  - name: devteam
    path: .
    role: primary
    changes: >
      UI-only feature. Add a Kanban board view to the Dashboard
      (ui/src/pages/Dashboard.tsx or a new ui/src/components/KanbanBoard.tsx)
      with six phase columns, reusing the existing FeatureCard component.
      Add a List/Kanban view toggle with localStorage persistence.
      No backend, no Go, no API, no database changes. No new npm runtime
      dependencies. New Playwright e2e specs under ui/e2e/ cover the
      acceptance criteria.