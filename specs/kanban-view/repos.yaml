feature_id: kanban-view
# Repositories affected by the kanban-view feature.
# This feature is a UI-only change to the Dev Team web app. It adds a Kanban
# board view over the existing GET /api/features response. No backend changes,
# no new endpoints, no DTO changes — therefore only the devteam repo is in scope.
repos:
  - name: devteam
    path: .
    role: primary
    changes: >
      Adds a KanbanBoard component under ui/src/components/, a KanbanCard
      component, a KanbanColumn component, a groupFeaturesByPhase helper under
      ui/src/components/, a ViewToggle component, and Playwright e2e tests
      under ui/e2e/. Modifies ui/src/pages/Dashboard.tsx to host the toggle
      and conditionally render the board. Reuses the existing GET /api/features
      endpoint, FeatureCard badge patterns, and react-query ['features'] cache.
      No changes to internal/api/, internal/feature/, or the Go binary.