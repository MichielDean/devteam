repos:
  - name: devteam
    path: .
    role: primary
    changes: >
      Frontend-only change for the read-only Kanban MVP. No backend changes.
      Add a KanbanBoard view component (ui/src/components/KanbanBoard.tsx) and
      a KanbanColumn component (or inline) that renders six phase columns using
      the existing PHASES/PHASE_LABELS from ui/src/types/index.ts. Add a
      view-toggle segmented control (List | Kanban) and a priority filter
      control to ui/src/pages/Dashboard.tsx. Persist view preference via
      ?view= URL query param (precedence) + localStorage['devteam-dashboard-view']
      fallback. Reuse the existing useQuery({queryKey:['features']}) cache —
      no new API calls, no new endpoints. Add Playwright E2E tests in
      ui/e2e/kanban.spec.ts covering toggle, column placement, count badges,
      empty columns, card navigation, priority filter, view persistence,
      horizontal scroll, dark mode, and error/loading/empty states. Run on
      port 18765 per existing playwright.config.ts. Update ui/src/types/index.ts
      only if a new ViewPreference type is added (client-only UI state).