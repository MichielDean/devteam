# Dev Team Configuration — AIDLC v2

version: "2.0"

# Database configuration for operational data (features, stages, audit events, etc.)
database:
  dsn: "host=localhost port=5432 user=devteam password=devteam dbname=devteam sslmode=disable"

# AIDLC v2 pipeline configuration
# Stages are defined in the DB (stage_definitions table), seeded on startup.
# This config is kept for the human interaction timeout and role rules.
pipeline:
  human_interaction_timeout_minutes: 30
  # Default execution mode for new features.
  # Modes: human (approve every stage), guided (auto-run, pause at phase-end gates),
  # autonomous (auto-run everything, auto-approve all gates).
  execution_mode: human
  # Phases are kept for backward compat with config loading.
  # AIDLC v2 uses 32 stages across 5 phases, not 6 phases.
  phases:
    - name: ideation
      roles: [product]
      rules: rules/aidlc/core-workflow.md
    - name: inception
      roles: [product]
      rules: rules/aidlc-rule-details/inception/
    - name: construction
      roles: [developer]
      rules: rules/aidlc-rule-details/construction/code-generation.md

# AIDLC v2 agent roles (10 agents + 2 reviewers)
# Role files are in roles/<name>/INSTRUCTIONS.md
roles:
  product:
    name: Product Agent
    description: Requirements, user stories, market research, scope. Leads Intent Capture, Market Research, Scope Definition, Requirements Analysis, User Stories.
    instructions: roles/product/INSTRUCTIONS.md

  design:
    name: Design Agent
    description: UX/UI, wireframes, interaction design, accessibility. Leads Rough Mockups, Refined Mockups.
    instructions: roles/design/INSTRUCTIONS.md

  delivery:
    name: Delivery Agent
    description: Team formation, Bolt sequencing, delivery planning. Leads Team Formation, Approval & Handoff, Delivery Planning.
    instructions: roles/delivery/INSTRUCTIONS.md

  architect:
    name: Architect Agent
    description: App design, domain modeling, NFRs, decomposition. Leads Feasibility, Application Design, Units Generation, Functional Design, NFR Requirements, NFR Design.
    instructions: roles/architect/INSTRUCTIONS.md

  platform:
    name: Platform Agent
    description: Cloud-agnostic infrastructure (Linux/systemd/Docker). Leads Infrastructure Design, Environment Provisioning.
    instructions: roles/platform/INSTRUCTIONS.md

  devsecops:
    name: DevSecOps Agent
    description: Threat modeling, security scanning, DevSecOps. Supports NFR Requirements, Infrastructure Design, Build and Test.
    instructions: roles/devsecops/INSTRUCTIONS.md

  developer:
    name: Developer Agent
    description: Code implementation, reverse engineering, data modelling. Leads Reverse Engineering, Code Generation.
    instructions: roles/developer/INSTRUCTIONS.md

  quality:
    name: Quality Agent
    description: Test strategy, test generation, perf validation. Leads Build and Test, Performance Validation.
    instructions: roles/quality/INSTRUCTIONS.md

  pipeline-deploy:
    name: Pipeline & Deploy Agent
    description: CI/CD pipelines, deployment strategy. Leads Practices Discovery, CI Pipeline, Deployment Pipeline, Deployment Execution.
    instructions: roles/pipeline-deploy/INSTRUCTIONS.md

  operations:
    name: Operations Agent
    description: Observability, incident response, SLOs, feedback. Leads Observability Setup, Incident Response, Feedback & Optimization.
    instructions: roles/operations/INSTRUCTIONS.md

  product-lead:
    name: Product Lead (Reviewer)
    description: Reviews requirements, user stories, UX artifacts for completeness and business alignment.
    instructions: roles/product-lead/INSTRUCTIONS.md

  architecture-reviewer:
    name: Architecture Reviewer
    description: Reviews technical design artifacts for soundness, implementability, coherence.
    instructions: roles/architecture-reviewer/INSTRUCTIONS.md

extensions:
  security:
    opt_in: true
    load_for_priority: [1]
    rules: rules/aidlc-rule-details/extensions/security/baseline/security-baseline.md

  resiliency:
    opt_in: true
    load_for_priority: [1, 2]
    rules: rules/aidlc-rule-details/extensions/resiliency/baseline/resiliency-baseline.md

intake:
  loose_idea:
    description: Rough idea, sentence, or vague description. Scope auto-detected. Product agent explores and refines into structured spec.
    output: [spec.md, acceptance.md, repos.yaml]

  external_spec:
    description: PRD, RFC, roadmap, or other formal requirements document. Product agent decomposes into N feature specs.
    output: [N x spec.md, acceptance.md, repos.yaml]

spec_repo:
  path: .
  specs_dir: specs/
  constitution_dir: constitution/